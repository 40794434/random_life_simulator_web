<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Life Simulator</title>
    <!-- <link rel="stylesheet" href="css/indexstyle.css"> -->
    <link rel="stylesheet" href="css/gamestyle.css" />
    <script src="https://kit.fontawesome.com/ceb58c878a.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <main class="game">
      <div class="left-panel">
        <div class="avatar">
          <img src="images/male_1.jpg" alt="Avatar" id="gameAvatar" />
        </div>

        <h2 id="nameDisplay"></h2>
        <p>Age: <span id="ageDisplay"></span></p>

        <div class="stats">
          <h3>Stats</h3>

          <div class="stats-bar">
            <label for="">Happiness</label>
            <progress id="happinessBar" value="" max="100"></progress>
            <span id="happinessValue"></span>
          </div>

          <div class="stats-bar">
            <label for="">Wealth</label>
            <progress id="wealthBar" value="" max="100"></progress>
            <span id="wealthValue"></span>
          </div>

          <div class="stats-bar">
            <label for="">Health</label>
            <progress id="healthBar" value="" max="100"></progress>
            <span id="healthValue"></span>
          </div>

          <div class="stats-bar">
            <label for="">Intelligence</label>
            <progress id="intelligenceBar" value="" max="100"></progress>
            <span id="intelligenceValue"></span>
          </div>
        </div>

        <button id="nextYearBtn">Next Year</button>
      </div>
      <div id="eventPopUp" class="popup hidden">
        <div class="modalContent">
          <p id="modalText"></p>
          <div id="modalBtns"></div>
        </div>
      </div>
      <div class="right-panel">
        <div class="current_event">
          <!-- <h3>Current year</h3>
          <p id="eventText">
           
          </p> -->

          <div id="choices"></div>
        </div>
        <div class="event-log">
          <h3>Event History</h3>
          <div id="eventHistory"></div>
        </div>
      </div>

      <audio src="sounds/increase.mp3" id="increaseEffect"></audio>
      <audio src="sounds/decrease.mp3" id="decreaseEffect"></audio>
      <audio src="sounds/death.mp3" id="deathEffect"></audio>

      <button id="muteBtn"><i id="icon" class="fa-solid fa-volume"></i></button>
    </main>
  </body>
   <script src="js/game.js"></script>
</html>
